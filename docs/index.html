<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <title>灯台 — 今日のキュレーション</title>
  <meta name="description" content="気仙沼・分子栄養・ハンドパン・AIの最新情報を毎朝キュレーション。テキスト一覧＋5分音声ダイジェスト。" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <!-- ヘッダー -->
    <header class="header">
      <button id="prevDay" class="nav-btn" aria-label="前日">‹</button>
      <div class="header-title">
        <span class="beacon">🗼</span>
        <h1 id="dateLabel">読み込み中…</h1>
      </div>
      <button id="nextDay" class="nav-btn" aria-label="翌日">›</button>
      <button id="settingsBtn" class="nav-btn" aria-label="設定">⚙️</button>
    </header>

    <!-- 音声プレイヤー -->
    <section class="player" id="player">
      <button id="playBtn" class="play-btn" aria-label="再生">
        <span class="play-icon">▶</span>
      </button>
      <div class="player-info">
        <div class="player-title">今日の5分ダイジェスト</div>
        <div class="player-meta">
          <span id="playTime">0:00</span>
          <span id="playMode" class="play-mode"></span>
        </div>
      </div>
      <div class="rate-group" role="group" aria-label="再生速度">
        <button class="rate-btn active" data-rate="1.0">1.0x</button>
        <button class="rate-btn" data-rate="1.25">1.25x</button>
        <button class="rate-btn" data-rate="1.5">1.5x</button>
      </div>
    </section>

    <!-- キーワードタブ -->
    <nav class="tabs" id="tabs" role="tablist"></nav>

    <!-- 記事一覧 -->
    <main class="feed" id="feed" aria-live="polite"></main>

    <!-- フッター -->
    <footer class="footer">
      <span id="lastUpdated"></span>
      <div class="archive" id="archive"></div>
    </footer>
  </div>

  <!-- 設定パネル（キーワードの並び替え・表示切替・編集） -->
  <div id="settingsOverlay" class="settings-overlay" hidden>
    <div class="settings-panel" role="dialog" aria-modal="true" aria-label="設定">
      <div class="settings-header">
        <h2>設定</h2>
        <button id="settingsClose" class="nav-btn" aria-label="閉じる">×</button>
      </div>

      <section class="settings-section">
        <h3>タブの並び替え・表示</h3>
        <p class="settings-hint">この端末だけの設定です。↑↓で並び替え、チェックで表示/非表示。</p>
        <ul id="kwPrefsList" class="kw-prefs-list"></ul>
      </section>

      <section class="settings-section">
        <h3>収集キーワードの編集</h3>
        <p class="settings-hint">
          config.json をGitHub経由で書き換えます。反映は翌朝6時の自動更新です。
        </p>
        <div id="ghTokenBox" class="gh-token-box">
          <label for="ghTokenInput">GitHub トークン（Fine-grained PAT）</label>
          <input id="ghTokenInput" type="password" placeholder="github_pat_..." autocomplete="off" />
          <button id="ghTokenSave" class="settings-btn">保存</button>
          <p class="settings-hint">
            このトークンは端末内（localStorage）にのみ保存され、サーバーには送信されません。<br />
            必要権限: リポジトリ <code>sato-sansan/toudai</code> の
            <strong>Contents: Read and write</strong>、<strong>Actions: Read and write</strong>。
          </p>
        </div>

        <div id="ghEditArea" class="gh-edit-area" hidden>
          <button id="ghTokenClear" class="settings-btn settings-btn-ghost">トークンを削除</button>
          <ul id="kwEditList" class="kw-edit-list"></ul>
          <div class="gh-edit-actions">
            <button id="kwAddBtn" class="settings-btn settings-btn-ghost">＋ キーワードを追加</button>
            <button id="kwSaveBtn" class="settings-btn">config.jsonに保存</button>
          </div>
          <div id="ghStatus" class="gh-status" aria-live="polite"></div>
          <button id="ghDeployBtn" class="settings-btn settings-btn-accent" hidden>今すぐ更新を実行</button>
        </div>
      </section>
    </div>
  </div>

  <audio id="audioEl" preload="none"></audio>
  <script src="app.js"></script>
</body>
</html>
